apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: backend-poc-prod

resources:
  - namespace.yaml
  - ../../base
  - servicemonitor.yaml

patches:
  - path: patch-service.yaml
    target:
      kind: Service
      name: backend-server

images:
  - name: aristeukafka/backend-server-k8s-poc
    newTag: "1.0.0"
