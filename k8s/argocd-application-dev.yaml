apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-server-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/aristeu-garcia/backend-server-k8s-poc.git
    targetRevision: main
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: backend-poc-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true

  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: backend-server
      namespace: backend-poc-dev
      jsonPointers:
        - /spec/replicas
