apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-server
  namespace: backend-poc
  labels:
    app: backend-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-server
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          # alvo baixo de propósito: o request é 50m, 50% = 25m.
          # sob carga o pod passa disso facil e o HPA sobe pra 2 réplicas.
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      # sobe rápido, bom pra ver o demo acontecer
      stabilizationWindowSeconds: 0
    scaleDown:
      # desce devagar pra não "piscar" de volta pra 1 assim que a carga cai
      stabilizationWindowSeconds: 60
