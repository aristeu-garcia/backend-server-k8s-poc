apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-server
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/aristeu-garcia/backend-server-k8s-poc.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: backend-poc

  syncPolicy:
    automated:
      prune: true      # remove do cluster o que for apagado do Git
      selfHeal: true   # reverte mudanças feitas direto no cluster (kubectl edit etc.)
    syncOptions:
      - CreateNamespace=true
